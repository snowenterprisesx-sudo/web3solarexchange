version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: vault_user
      POSTGRES_PASSWORD: vault_password
      POSTGRES_DB: vault_omni
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vault_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://vault_user:vault_password@postgres:5432/vault_omni
      NODE_ENV: development
      PORT: 3001
      PAYMASTER_KEY: ${PAYMASTER_KEY}
      BUNDLER_URL: ${BUNDLER_URL}
      VALIDATOR_KEYS: ${VALIDATOR_KEYS}
      RPC_ETHEREUM: ${RPC_ETHEREUM}
      RPC_BNB: ${RPC_BNB}
      RPC_POLYGON: ${RPC_POLYGON}
      RPC_ARBITRUM: ${RPC_ARBITRUM}
      MINING_REWARD_INTERVAL_MS: 60000
      MINING_BASE_RATES: '{"GMX":0.001,"TRX":0.05,"TON":0.02}'
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
    command: npm run dev

volumes:
  postgres_data:
